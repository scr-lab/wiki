name: Validate on Pull Request

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write  # PR コメント用

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. チェックアウト
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Zola インストール（キャッシュ利用）
      # ------------------------------------------------------------------
      - name: Cache Zola binary
        id: cache-zola
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/zola
          key: zola-${{ runner.os }}-0.22.1

      - name: Install Zola
        if: steps.cache-zola.outputs.cache-hit != 'true'
        run: |
          ZOLA_VERSION="0.22.1"
          curl -sL \
            "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /tmp
          mkdir -p ~/.local/bin
          mv /tmp/zola ~/.local/bin/zola
          chmod +x ~/.local/bin/zola
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Add Zola to PATH (cache hit)
        if: steps.cache-zola.outputs.cache-hit == 'true'
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # ------------------------------------------------------------------
      # 3. バリデーション (F-C03) — ERROR があればジョブ失敗
      # ------------------------------------------------------------------
      - name: Validate content (F-C03)
        id: validate
        run: |
          python3 tools/validate.py 2>&1 | tee /tmp/validate_output.txt
          exit ${PIPESTATUS[0]}

      # ------------------------------------------------------------------
      # 4. ビルド確認（ドラフト含む）
      # ------------------------------------------------------------------
      - name: Build check (with drafts)
        run: zola build --drafts

      # ------------------------------------------------------------------
      # 5. PR にバリデーション結果をコメント
      # ------------------------------------------------------------------
      - name: Post validation result as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try {
              output = fs.readFileSync('/tmp/validate_output.txt', 'utf8');
            } catch (e) {
              output = 'バリデーション出力を取得できませんでした。';
            }
            const success = ${{ steps.validate.outcome == 'success' }};
            const icon    = success ? '✅' : '❌';
            const status  = success ? '問題なし' : 'ERROR を検出';

            const body = [
              `## ${icon} コンテンツバリデーション結果: ${status}`,
              '',
              '```',
              output.slice(0, 3000),
              output.length > 3000 ? '\n... (省略)' : '',
              '```',
              '',
              success
                ? 'ビルドも正常に完了しました。マージ可能です。'
                : '**ERROR を修正してからマージしてください。**',
            ].join('\n');

            await github.rest.issues.createComment({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
