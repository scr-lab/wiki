# Zola 設定ファイル
# SCR Lab Wiki — SCR-WIKI-SPEC-001
# 使用バージョン: Zola 0.22.1 (NF-M02)

base_url = "https://scr-lab.github.io/wiki"
title = "SCR Lab Wiki"
description = "システム制御・ロボティクス研究室 知識共有 Wiki"

default_language = "en"
# theme は指定しない（独自テンプレートを直接 templates/ に配置するため）

# 検索インデックス (F-B02)
build_search_index = true

[search]
index_format = "fuse_json"

# Markdown 設定
# Zola 0.22.x: ハイライト設定は [markdown.highlighting] サブセクション。
# style = "class" にすると CSS クラスベースになり、
# static/giallo-light.css と static/giallo-dark.css が自動生成される。
[markdown]
render_emoji = true
external_links_target_blank = true
external_links_no_follow = false
external_links_no_referrer = false
smart_punctuation = false

[markdown.highlighting]
style       = "class"
light_theme = "github-light"
dark_theme  = "github-dark"

# Taxonomy (F-A03: タグ一覧)
taxonomies = [
  { name = "tags", feed = false, paginate_by = 0 },
]

[extra]
# サイト共通設定
github_repo = "https://github.com/scr-lab/wiki"
wiki_url    = "https://scr-lab.github.io/wiki"

# Teams 通知（GitHub Secrets で TEAMS_WEBHOOK_URL を設定）
teams_notify_enabled = true

# カテゴリ定義（サイドバー描画・F-C03 バリデーション用）
# Tera テンプレートから config.extra.categories でアクセスする。
# sidebar.html の多次元配列定義エラーを回避するため TOML 構造体として定義。

[[extra.categories]]
slug  = "onboarding"
label = "オンボーディング"
icon  = "🚀"

[[extra.categories]]
slug  = "research"
label = "研究"
icon  = "🔬"

[[extra.categories]]
slug  = "knowledge"
label = "ナレッジ"
icon  = "💡"

[[extra.categories]]
slug  = "projects"
label = "プロジェクト"
icon  = "🗂️"

[[extra.categories]]
slug  = "meeting"
label = "議事録"
icon  = "📋"
