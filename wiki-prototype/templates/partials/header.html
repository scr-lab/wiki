<!-- ヘッダ: 高さ 60px 固定 / position: sticky (7.4) -->
<header class="site-header" role="banner">
  <!-- ハンバーガーメニュー（モバイル） -->
  <button class="hamburger" id="sidebar-toggle" aria-label="メニューを開く" aria-expanded="false" aria-controls="sidebar">
    <span class="hamburger__bar"></span>
    <span class="hamburger__bar"></span>
    <span class="hamburger__bar"></span>
  </button>

  <!-- ロゴ -->
  <a href="{{ config.base_url }}" class="site-header__logo" aria-label="SCR Lab Wiki ホームへ">
    <span class="site-header__logo-mark" aria-hidden="true">◈</span>
    <span class="site-header__logo-text">SCR Lab <strong>Wiki</strong></span>
  </a>

  <!-- 検索バー (F-B02) -->
  {% include "partials/search.html" %}

  <!-- 右側アクション -->
  <div class="site-header__actions">
    <!-- カラーモード切替 (7.4) -->
    <button class="icon-btn" id="theme-toggle" aria-label="カラーモードを切り替える" title="カラーモード切替">
      <svg class="icon icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <!-- GitHub リンク -->
    <a href="{{ config.extra.github_repo }}" class="icon-btn" target="_blank" rel="noopener noreferrer" aria-label="GitHub リポジトリ" title="GitHub">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
      </svg>
    </a>
  </div>
</header>

<script>
  // カラーモード切替 (7.2)
  document.getElementById('theme-toggle')?.addEventListener('click', function () {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('color-scheme', next);
    // Syntax CSS 切替
    const syntaxLink = document.getElementById('syntax-css');
    if (syntaxLink) {
      syntaxLink.href = syntaxLink.href.replace(/giallo-(light|dark)\.css/, 'giallo-' + next + '.css');
    }
  });
</script>
